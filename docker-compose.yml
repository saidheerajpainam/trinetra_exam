version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: trinetra-postgres-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: trinetra
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trinetra-backend-api
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/trinetra?schema=public
      - JWT_SECRET=trinetra_super_secret_jwt_key_2026
      - FRONTEND_URL=http://localhost:5173
    depends_on:
      - db
    volumes:
      - uploads_data:/usr/src/app/uploads

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: trinetra-frontend-client
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  uploads_data:
